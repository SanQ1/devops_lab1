version: '3.8'

services:
  # СЕРВІС БАЗИ ДАНИХ 
  db:
    image: mariadb:11.2
    container_name: inventory_db_container
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password_123
      MARIADB_DATABASE: inventory_db
      MARIADB_USER: inventory_user
      MARIADB_PASSWORD: password123
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inventory_network

# СЕРВІС ВЕБ-ЗАСТОСУНКУ 
  web:
    build:
      context: ./
    container_name: inventory_web_container
    restart: always
    command: gunicorn --bind 0.0.0.0:8000 --workers 2 app:app
    environment:
      DB_HOST: db
      DB_USER: inventory_user
      DB_PASSWORD: password123
      DB_NAME: inventory_db
      APP_PORT: 8000
    depends_on:
      - db
    networks:
      - inventory_network

  # СЕРВІС ВЕБ-СЕРВЕРА 
  nginx:
    image: nginx:alpine
    container_name: inventory_nginx_container
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - inventory_network

      
networks:
  inventory_network:
    driver: bridge 

volumes:
  mariadb_data:
    driver: local 
