name: CI/CD Pipeline

# 1. УМОВИ ЗАПУСКУ КОНВЕЄРА 
on:
  push:
    branches: [ "master" ]  
    tags: [ "v*" ]        
  pull_request:
    branches: [ "main" ] 

# Дозволи для роботи з GitHub Container Registry 
permissions:
  contents: read
  packages: write

jobs:
  # СТАТИЧНИЙ АНАЛІЗ (Linter) 
  lint:
    name: Run Linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Перевірка Python-коду за допомогою Flake8 
      - name: Lint Python Code with Flake8
        run: |
          pip install flake8
          flake8 .

      # Перевірка Dockerfile за допомогою Hadolint 
      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # АВТОМАТИЧНІ ТЕСТИ 
  test:
    name: Run Code Tests
    runs-on: ubuntu-latest
    needs: lint 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          pytest --cov=app test_app.py --cov-fail-under=40 --cov-report=xml --cov-report=html

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: code-coverage-report
          path: htmlcov/

  # ЗБІРКА ТА ПУБЛІКАЦІЯ ОБРАЗУ 
  build:
    - name: Extract Docker Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/mywebapp
        tags: |
          type=raw,value=latest,enable=${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
          type=sha,format=long,enable=${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
          type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
