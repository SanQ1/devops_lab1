name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  packages: write

jobs:
  # СТАТИЧНИЙ АНАЛІЗ 
  lint:
    name: Run Linters
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Python Code with Flake8
        run: |
          pip install flake8
          flake8 .

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # АВТОМАТИЧНІ ТЕСТИ 
  test:
    name: Run Code Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          pytest --cov=app test_app.py --cov-fail-under=40 --cov-report=xml --cov-report=html

      - name: Upload Coverage Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-report
          path: htmlcov/

  # ЗБІРКА ТА ПУБЛІКАЦІЯ ОБРАЗУ 
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mywebapp
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
            type=sha,format=long,enable=${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # АВТОМАТИЧНЕ РОЗГОРТАННЯ 
  deploy:
    name: Deploy to Target Node
    runs-on: self-hosted 
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'unnecessary' 
          if_key_exists: replace

      - name: Copy Deploy Script to Target Node
        run: |
          scp -o StrictHostKeyChecking=no deploy.sh ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }}:/tmp/deploy.sh

      - name: Execute Remote Deploy Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} \
            "GITHUB_TOKEN=\"$GITHUB_TOKEN\" GITHUB_ACTOR=\"$GITHUB_ACTOR\" bash /tmp/deploy.sh ghcr.io/${{ github.repository }}/mywebapp:stable"

      - name: Run Deployment Verification
        run: |
          bash verify.sh ${{ secrets.TARGET_HOST }}
